<!DOCTYPE html>
<html lang="rw">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ibizami - System</title>

<style>

/* =========================
   GLOBAL / IFRAME RULES
========================= */
html, body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  background-color: #e5e5e5;

  font-family: 'Inter', sans-serif;
  font-size: 20px;

  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* =========================
   PHONE WRAPPER
========================= */
.phone-wrapper {
  display: flex;
  justify-content: center;
  min-height: 100vh;
  padding: 10px;
}

.phone-screen {
  width: 100%;
  max-width: 420px;
  background: #fff;
  min-height: 100vh;

  border-radius: 16px;

  overflow-y: auto;   /* ✅ allow vertical scroll */
  overflow-x: hidden;

  box-shadow: 0 0 20px rgba(0,0,0,0.15);
}
 
/* =========================
   MAIN MENU (PARENT)
========================= */
#mainMenu {
  min-height: 100vh;
  width: 100%;
  padding: 3px 3px; /* ↓ yagabanyijwe */
  background: #ffffff;
  padding-top: 5px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start; /* VERY IMPORTANT */
}


/* VERY IMPORTANT */
#mainMenu button {
  display: block !important;
  width: 100%;
  max-width: 420px;
  margin: 15px auto;
}

/* Title */
#mainMenu h2 {
  width: 100%;
  text-align: center;
  margin: 5px auto 6px auto;

  white-space: normal;      /* Allow wrapping */
  word-break: break-word;   /* Prevent cut */
  overflow-wrap: break-word;

  font-size: 22px;          /* Adjust if too big */
  line-height: 1.3;
}

#quizMenu h3,
#quizMenuTwoWeeks h3,
#quizMenuMonth h3{
  text-align:center;
  margin-left: auto;
  margin-right: auto;
}

/* Menu Buttons */
.menu-btn {
  padding: 18px;
  padding-top: 5px;
  font-size: 20px;
 font-weight: normal;
 border: none;
 margin-top: 5px;
margin-bottom: 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.25s ease;
}

.menu-navy {
  background: #005CAB;
  color: #fff;
}

.menu-navy:hover {
  background: #1F2A7A;
}

/* ================= DISABLED STATE (OPTIONAL) ================= */
.menu-btn:disabled {
  background-color: #cccccc;
  color: #666666;
  cursor: not-allowed;
  animation: none;
  box-shadow: none;
  transform: none;
}

/* ================= ANIMATION ================= */
@keyframes pulse {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.02); }
  100% { transform: scale(1); }
}

/* =========================
   QUIZ AREA (CHILDREN)
========================= */
.quiz-container {
  display: none;
  min-height: 100vh;
  background: #fff;
  padding: 20px;
  padding-bottom: 120px;    /* space ya submit & review */
box-sizing: border-box;
}

/* =========================
   HOME BUTTON (TOP)
========================= */
.quiz-home-button {
  background-color: #1F2A7A;
  color: white;
  border: none;
  padding: 8px 12px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
  display: block;

  /* 🔥 WIDTH FIX */
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;

  margin: 20px auto;
}

.quiz-home-button:hover {
  background-color: #130D4C;
}

/* =========================
   QUIZ BUTTONS (MERGED STYLE)
========================= */
.custom-button {
  min-width: 90px;
  padding: 10px 14px;
  font-size: 14px;
  color: white;

  /* 🔥 use your original gradient */
  background: linear-gradient(135deg, #007bff, #0056b3);

  border: none;
  border-radius: 6px;
  cursor: pointer;

  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);

  transition: transform 0.2s ease, background 0.3s ease;
}

.custom-button:hover {
  background: linear-gradient(135deg, #0056b3, #003d80);
  transform: scale(1.03);
}

.custom-button {
  margin: 4px;
}

.custom-button:active {
  transform: scale(0.98);
}

/* 🟡 Started */
.custom-button.active-quiz {
  background: linear-gradient(135deg, #ffc107, #e0a800);
}

/* 🟢 Completed */
.custom-button.completed-quiz {
  background: linear-gradient(135deg, #28a745, #1e7e34);
}

.quiz-buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  text-align: center;
}



/* 🟢 ACTIVE QUIZ */
.custom-button.active-quiz {
  background: #28a745 !important;
}

/* ⚪ STARTED / COMPLETED / SUBMITTED */
.custom-button.done-quiz {
  background: #6c757d !important;
}

/* (optional) hover stays clean */
.custom-button.done-quiz:hover {
  background: #5a6268 !important;
}
/* =========================
   🟢 ACTIVE QUIZ ANIMATION
========================= */
.custom-button.active-quiz {
  background: linear-gradient(135deg, #28a745, #1e7e34) !important;
  box-shadow: 0 4px 10px rgba(0,128,0,0.4);

  /* 🔥 animation */
  animation: activePulse 1.8s infinite;
}

/* 🔥 pulse effect */
@keyframes activePulse {
  0% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(40,167,69, 0.6);
  }

  50% {
    transform: scale(1.05);
    box-shadow: 0 0 0 8px rgba(40,167,69, 0);
  }

  100% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(40,167,69, 0);
  }
}


.quiz-history-button {
  display: block;
  width: 100%;
  max-width: 340px;
  margin: 10px auto 20px auto;
  padding: 10px;

  background: linear-gradient(135deg, #17a2b8, #117a8b);
  color: white;

  border: none;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;

  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.quiz-history-button:hover {
  background: linear-gradient(135deg, #117a8b, #0b5c66);
}

.home-button {
      background-color: gray;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: normal;
      border-radius: 6px;
      cursor: pointer;
      width: 90%;
      margin-top: 15px;
    }
    .home-button:hover {
      background-color: darkgray;
    }


@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}

  /* Base Quiz Container Styles */
.quiz-container {
  display: none;
  padding: 16px;
  background: #fff;
  width: 100%;
  box-sizing: border-box;
  border-radius: 10px;
  box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
}

[id^="timer"] {
  font-weight: bold;
  color: black;
  margin-bottom: 12px;
  margin: 6px 0 10px;
  padding: 6px 14px;
  width: fit-content;
  text-align: left;
  font-size: 14px;
  background: #e6f0ff;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

#pauseBtn {
  display: inline-block;
  margin: 8px 0 12px;
  padding: 8px 14px;   /* 🔥 slightly bigger for mobile */
  font-size: 14px;

  border: none;
  border-radius: 6px;
  background: #1F2A7A;
  color: white;
  cursor: pointer;
}

#pauseBtn:hover {
  background: #130D4C;
}

/* Make all quiz intro text italic */
.quiz-intro {
  font-style: italic;
}

.question-block {
  margin-bottom: 40px;
}

.question-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: white;
  padding-top: 6px;
}

/* TIMER STYLE */
.question-timer {
  margin: 6px 0 10px;
  padding: 6px 14px;
  width: fit-content;

  background: #e6f0ff;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);

  color: black;
  font-weight: bold;
  font-size: 14px;
  border-radius: 12px;

  display: flex;
  align-items: center;
  gap: 10px;

  pointer-events: auto; /* 🔥 CRITICAL FIX */
}

/* MINI BUTTON */
.miniPauseBtn {
  padding: 2px 8px;
  font-size: 12px;
  border: none;
  border-radius: 6px;
  background: #1F2A7A;
  color: white;
  cursor: pointer;
}

.miniPauseBtn:hover {
  background: #130D4C;
}

/* =========================
   QUESTION TEXT
========================= */
.question {
  font-weight: bold;
  margin-bottom: 20px;
}

/* =========================
   OPTION BUTTONS (FINAL FIXED)
========================= */
.option-button {
  display: block;
  width: 100%;              /* 🔥 ensures full width */
  text-align: left;         /* 🔥 aligns text nicely */
  font-weight: bold;

  margin: 10px 0;            /* small consistent spacing */
  padding: 12px;

  border: 2px solid #ccc;
  border-radius: 6px;
  background-color: white;
  cursor: pointer;
  font-size: 20px;          /* 🔥 slightly balanced */
  line-height: 1.4;

  transition: all 0.2s ease;
  box-sizing: border-box;   /* 🔥 prevents overflow issues */
}

/* Hover */
.option-button:hover {
  background-color: #eef;
  transform: scale(1.01);   /* 🔥 smoother (was too big) */
}

/* Correct / Wrong */
.option-button.correct {
  background-color: #c8f7c5 !important;
  border-color: forestgreen;
}

.option-button.wrong {
  background-color: #f7c5c5 !important;
  border-color: red;
}

/* =========================
   RADIO INPUT
========================= */
input[type="radio"] {
  transform: scale(1.5);
  margin: 10px;
  accent-color: #007bff;
  cursor: pointer;
}

input[type="radio"]:checked {
  outline: 2px solid #007bff;
  box-shadow: 0 0 5px #007bff;
}

.quiz-submitted input[type="radio"]:checked {
  accent-color: forestgreen;
  outline: 2px solid #007bff;
  box-shadow: 0 0 5px #007bff; /* 🔥 fixed small typo */
}

/* =========================
   FEEDBACK TEXT
========================= */
.correct::after {
  content: " ✅";
  color: green;
  margin-left: 4px;
  font-weight: bold;
}

.wrong::after {
  content: " ❌ Icyo wasubije si cyo! Reba igisubizo cy'ukuri mu ibara ry'icyatsi.";
  color: red;
  margin-left: 4px;
  font-weight: bold;
}

/* =========================
   IMAGE LAYOUT (MERGED)
========================= */
.question-block.with-image {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  flex-wrap: wrap;
}

.question-block.with-image .question-header {
  flex: 1;
  min-width: 280px;
}

.question-block.with-image .question img {
  max-width: 100%;
  object-fit: cover;
  border-radius: 6px;
  display: block;
  margin-top: 10px;
}

.question-block.with-image .options-container {
  display: flex;
  flex-direction: column;
  justify-content: flex-start; /* 🔥 align to top (important) */
}

/* Remove unwanted spacing */
.question-block.with-image .option-button:first-child {
  margin-top: 0;
}

.submit-button, .review-button, .home-button {
  width: 100%;
  max-width: 320px;
  height: 40px;
  color: white;
  border: none;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  margin: 12px auto;
  display: block;
  border-radius: 8px;
  transition: background-color 0.3s ease;
}

.submit-button { background-color: #555; }
.submit-button:hover { background-color: #777; }
.review-button { background-color: #555; }
.review-button:hover { background-color: #777; }
.home-button { background-color: #555; }
.home-button:hover { background-color: #777; }

[id^="result"] {
  margin-top: 20px;
  font-weight: bold;
  text-align: center;
  font-size: 1.1rem;
}

.info-form {
  background: #eef;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 18px;
  margin-top: 20px;
}
body {
  overflow-y: auto;
}
.info-form label {
  font-weight: bold;
  display: block;
  margin-bottom: 6px;
  font-size: 1rem;
}

.info-form input, .info-form select {
  font-size: 1rem;
  padding: 8px;
  margin-bottom: 12px;
  width: 100%;
  border: 1px solid #ccc;
  border-radius: 6px;
}

/* Make all form inputs stay inside form */
form input[type="text"],
form input[type="code"],
form input[type="number"],
form input[type="date"],
form select,
form textarea {
  width: 100%;
  box-sizing: border-box;
}

.spinner-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 20px 0;
  gap: 12px;
  flex-wrap: wrap;
}

.spinner {
  border: 6px solid #f3f3f3;
  border-top: 6px solid #3498db;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
}

.spinner-text {
  font-size: 1rem;
  color: darkblue;
  font-weight: bold;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Responsive adjustments */
@media (max-width: 768px) {
  body { font-size: 18px; padding: 10px; }
  .quiz-container { padding: 12px; }
  .info-form input, .info-form select { font-size: 0.95rem; }
  .submit-button, .review-button, .home-button { font-size: 0.9rem; height: 45px; }
}

@media (max-width: 480px) {

  .info-form {
    padding: 10px;
  }

  .info-form label {
    font-size: 0.9rem;
  }

  /* All timers automatically */
  [id^="timer"] {
    font-size: 14px;
  }

}


.quiz-action-bar {
  display: flex;
  gap: 12px;
  justify-content: space-between; /* or center */
}
 

#google_translate_element {
  text-align: center;
  margin-bottom: 5px;
  font-size: 14px;
}
  </style>
</head>

<body oncontextmenu="return false" onkeydown="return disableKeys(event)">
