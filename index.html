<style>

/* =========================
   GLOBAL / IFRAME RULES
========================= */
html, body {
  margin: 0;
  padding: 0;

  font-family: 'Inter', sans-serif;

}

/* =========================
   PHONE WRAPPER
========================= */
.phone-wrapper {
  display: flex;

}

.phone-screen {
  width: 100%;

   MAIN MENU (PARENT)
========================= */

/* VERY IMPORTANT */

}

/* Title */

#quizMenu h3,
#quizMenuTwoWeeks h3,

/* Menu Buttons */

 font-weight: normal;
 border: none;
 margin-top: 5px;
margin-bottom: 12px;

========================= */

box-sizing: border-box;

/* =========================

========================= */
.custom-button {

}

.custom-button:hover {

}

.custom-button {

}

.custom-button:active {

}

/* 🟡 Started */

/* 🟢 Completed */

}
/* =========================
   🟢 ACTIVE QUIZ ANIMATION
========================= */

/* 🔥 pulse effect */

  50% {

  }

<script>

/* =========================
   GLOBAL QUIZ CLEANER
   ========================= */

function resetQuizSystem() {

  /* Stop timer safely */
  if (typeof timer !== "undefined") {
    clearInterval(timer);
  }

  /* Reset states */
  submitted = false;
  quizStarted = false;

  if (typeof userAnswers !== "undefined") {
    userAnswers = Array(20).fill(null);
  }

  /* Clear quiz session */
  if (typeof currentQuiz !== "undefined" && typeof currentCategory !== "undefined") {

    sessionStorage.removeItem(
      `${currentCategory}_quizStartTime${currentQuiz}`
    );

    sessionStorage.removeItem(
      `${currentCategory}_quiz${currentQuiz}_submitted`
    );

  }

}


function generateQuizButtons(category, containerId) {

  const container = document.getElementById(containerId);
  if (!container) return;

  container.innerHTML = "";

  container.classList.add("quiz-buttons");

  setTimeout(() => {
    highlightActiveQuizButton();
  }, 50);

  const homeBtn = document.createElement("button");
  homeBtn.className = "quiz-home-button";
  homeBtn.textContent = "⬅ Subira ku bindi byiciro by'ibizami";
  homeBtn.onclick = goHome;

  /* 🔥 CATEGORY TITLE */
  let categoryLabel = "";

  if (category === "week") {
    categoryLabel = "by'icyumweru ku ma Frw 700";
  } else if (category === "twoWeeks") {
    categoryLabel = "by'ibyumweru bibiri";
  } else if (category === "month") {
    categoryLabel = "by'ukwezi ku ma Frw 1000";
  }

  const title = document.createElement("h3");
  title.textContent = "Ibizami (" + categoryLabel + ")";

  /* =========================
     🔥 HISTORY BUTTON (NEW)
  ========================= */
  const historyBtn = document.createElement("button");
  historyBtn.className = "quiz-history-button";
  historyBtn.textContent = "📊 Reba amanota yawe";
  historyBtn.onclick = () => showQuizHistory(category);

  /* =========================
     APPEND TOP ELEMENTS
  ========================= */
  container.appendChild(homeBtn);
  container.appendChild(title);
  container.appendChild(historyBtn); // 🔥 NEW (safe position)

  const total = QUIZ_LIMITS[category] || 0;

  for (let i = 1; i <= total; i++) {
    const btn = document.createElement("button");
    btn.className = "custom-button";
    btn.textContent = "Ikizami " + i;
    btn.onclick = () => openQuiz(i, category);

    container.appendChild(btn);
  }
}

function hideAll(){
  ['mainMenu','quizMenu','quizMenuTwoWeeks','quizMenuMonth','quiz-container']
  .forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.style.display = 'none';
  });
}

function openWeekly() {

  if (typeof resetQuizSystem === "function") {
    resetQuizSystem();
  }

  sessionStorage.setItem("selectedCategory", "week");

  location.reload();
}


function openTwoWeeks() {

  if (typeof resetQuizSystem === "function") {
    resetQuizSystem();
  }

  sessionStorage.setItem("selectedCategory", "twoWeeks");

  location.reload();
}


function openTwoWeeksDisabled() {

  alert(
    "⚠️\n\n" +
    "Muri ciyi cyiciro \"Ibyumweru Bibiri\" nta bibazo birashyirwamo.\n\n" +
    "Turimo kubitegura. Jya guhitamo ICYUMWERU cyangwa UKWEZI 🙏"
  );

  goHome();
}


function showCategoryDisabledMessage(categoryLabel) {

  alert(

document.addEventListener("DOMContentLoaded", function () {

  checkQuizVersion();
  setTimeout(() => {
  highlightActiveQuizButton();
}, 100);

  const cat = sessionStorage.getItem("selectedCategory");

  hideAll();

  /* 🔥 FIRST LOAD → SHOW MAIN MENU */
  if (!cat) {
    const main = document.getElementById("mainMenu");
    if (main) main.style.display = "block";
    return;
  }

  /* 🔥 EXISTING LOGIC (UNCHANGED) */
  const activeCategory = cat;

  currentCategory = activeCategory;

  if (activeCategory === "week") {
    generateQuizButtons("week", "quizMenu");
    document.getElementById("quizMenu").style.display = "block";
  }

  if (activeCategory === "twoWeeks") {
    generateQuizButtons("twoWeeks", "quizMenuTwoWeeks");
    document.getElementById("quizMenuTwoWeeks").style.display = "block";
  }

  if (activeCategory === "month") {
    generateQuizButtons("month", "quizMenuMonth");
    document.getElementById("quizMenuMonth").style.display = "block";
  }

  /* 🔥 BACKGROUND LOAD (UNCHANGED) */
  setTimeout(() => {

    if (activeCategory !== "week") {
      generateQuizButtons("week", "quizMenu");
    }

    if (activeCategory !== "twoWeeks") {
      generateQuizButtons("twoWeeks", "quizMenuTwoWeeks");
    }

    if (activeCategory !== "month") {
      generateQuizButtons("month", "quizMenuMonth");
    }

  }, 100);

});

function goHome() {

  resetQuizSystem();

  /* 🔥 CLEAR CATEGORY (IMPORTANT FIX) */
  sessionStorage.removeItem("selectedCategory");

  hideAll();

  const menu = document.getElementById("mainMenu");
  if (menu) menu.style.display = "block";

  if (menu) {
    menu.scrollIntoView({
      behavior: "smooth",
      block: "start"
    });
  }

}

function disableKeys(e) {
    const keys = [123, 73, 74, 85]; // F12, Ctrl+Shift+I/J/U

      (e.ctrlKey && e.shiftKey && ["I", "J", "C"].includes(e.key)) ||
      (e.ctrlKey && e.key === "U")
    ) {
      return false;
    }
  }

function getDayOfYear(date) {
  const start = new Date(date.getFullYear(), 0, 0);
  const diff = date - start;
  const oneDay = 1000 * 60 * 60 * 24;
  return Math.floor(diff / oneDay);
}

function normalizeDayOfYear(date) {
  const day = getDayOfYear(date);

  const isLeap =
    (date.getFullYear() % 4 === 0 && date.getFullYear() % 100 !== 0) ||
    date.getFullYear() % 400 === 0;

  if (isLeap && date.getMonth() === 1 && date.getDate() === 29) {
    return 59;
  }

  if (isLeap && day === 366) {
    return 365;
  }

  return day;
}

function getTodayValidCode(categoryKey) {
  const today = new Date();
  const year = today.getFullYear();
  const dayOfYear = normalizeDayOfYear(today);

  const prefixes = CATEGORY_PREFIXES[categoryKey];
  if (!prefixes || prefixes.length < 365) {
    console.error("Prefixes missing for category:", categoryKey);
    return null;
  }

  const prefix = prefixes[dayOfYear - 1];
  const dayStr = String(dayOfYear).padStart(3, "0");

  return `${prefix}${year}${dayStr}P`;
}

function isValidTodayCode(code, categoryKey = currentCategory) {

  // 🆓 FREE QUIZ
  if (
    currentQuiz === FREE_QUIZ_NUMBER &&
    code === FREE_QUIZ_CODE
  ) {
    return true;
  }

  // 🗓️ DAILY CODE (BY CATEGORY)
  if (!categoryKey) return false;

  const todayCode = getTodayValidCode(categoryKey);
  if (!todayCode) return false;

  return code === todayCode;
}

let currentQuiz = null;
let currentCategory = 'week'; // 🔴 VERY IMPORTANT

/************ OPEN QUIZ (QUIZ 1–?) ************/

function openQuiz(quizNumber, category) {

  /* =========================
     🔄 FORCE CLEAN PREVIOUS QUIZ
  ========================= */
  resetQuizSystem();

  /* =========================
     0️⃣ RESET QUIZ SESSION
  ========================= */
  sessionStorage.removeItem(`${currentCategory}_quizStartTime${quizNumber}`);
  sessionStorage.removeItem(`${currentCategory}_quiz${quizNumber}_submitted`);

  /* =========================
     1️⃣ Hide GLOBAL quiz container
  ========================= */
  const globalContainer = document.getElementById("quiz-container");
  if (globalContainer) globalContainer.style.display = "none";

  /* =========================
     2️⃣ Hide all quiz menus
  ========================= */
  ["quizMenu", "quizMenuTwoWeeks", "quizMenuMonth"].forEach(id => {
    const m = document.getElementById(id);
    if (m) m.style.display = "none";
  });

  /* =========================
     3️⃣ RESET STATE
  ========================= */
  currentQuiz = quizNumber;
  currentCategory = category;

  quizStarted = false;
  submitted = false;
  userAnswers = Array(20).fill(null);

/* =========================
   💾 SAVE LAST OPENED QUIZ
========================= */
localStorage.setItem("lastQuiz", quizNumber);
localStorage.setItem("lastCategory", category);
sessionStorage.setItem(
  "activeQuiz_" + currentCategory,
  currentQuiz
);

  /* =========================
     4️⃣ Detect active category (SAFE KEEP)
  ========================= */
  if (document.getElementById("quizWeek")?.style.display === "block") {
    currentCategory = "week";
  }

  if (document.getElementById("quizTwoWeeks")?.style.display === "block") {
    currentCategory = "twoWeeks";
  }

  if (document.getElementById("quizMonth")?.style.display === "block") {
    currentCategory = "month";
  }

  /* =========================
     5️⃣ Show GLOBAL quiz container
  ========================= */
  const quizContainer = document.getElementById("quiz-container");
  if (!quizContainer) return;

  quizContainer.style.display = "block";

  /* =========================
     🔤 UPDATE TITLE (FIXED)
  ========================= */
  const title = document.getElementById("quizTitle");
  if (title) {
    title.textContent = "Ikizami No." + quizNumber;
  }

  /* =========================
     6️⃣ FREE QUIZ LOGIC (SAFE)
  ========================= */
  if (quizNumber === FREE_QUIZ_NUMBER) {

    const codeInput = document.getElementById("code");

    if (codeInput) {
      codeInput.disabled = false;
      codeInput.placeholder = "ABC1234567P";
      codeInput.value = "";
    }
  }

  /* =========================
     🔐 SKIP SAVED CODE
  ========================= */
  if (checkSavedCode(currentCategory)) {
    skipCodeField(); // ⚠️ ntikigikeneye quizNumber
  }

  /* =========================
     7️⃣ Reset date
  ========================= */
  const dateInput = document.getElementById("date");
  if (dateInput) {
    dateInput.valueAsDate = new Date();
  }

  /* =========================
     8️⃣ Reset UI
  ========================= */
  const resultBox = document.getElementById("result");
  if (resultBox) resultBox.innerHTML = "";

  const reviewBox = document.getElementById("review");
  if (reviewBox) reviewBox.style.display = "none";

  const spinner = document.getElementById("spinnerContainer");
  if (spinner) spinner.style.display = "none";

  /* =========================
     9️⃣ Wix safe scroll
  ========================= */
  openQuizAutoScroll(quizNumber);
}

function openQuizAutoScroll(quizNumber) {
  setTimeout(() => {
    const codeInput = document.getElementById("code");
    if (!codeInput) return;

    // 🧠 Calculate safe Y position (Wix iframe friendly)
    const rect = codeInput.getBoundingClientRect();
    const viewportHeight = window.innerHeight || document.documentElement.clientHeight;

    // 👉 Dushyira input hagati ya page (not top!)
    const y =
      rect.top +
      window.pageYOffset -
      Math.max(80, viewportHeight * 0.25);

    window.scrollTo({
      top: y,
      behavior: "smooth"
    });

    // 🎯 Focus nyuma ya scroll
    setTimeout(() => {
      codeInput.focus();
    }, 300);

  }, 300);
}


function highlightActiveQuizButton() {

  /* 🎯 GET ACTIVE MENU ONLY */
  const menu = getActiveQuizMenu();
  if (!menu) return;

  const buttons = menu.querySelectorAll(".custom-button");

  const savedActive = sessionStorage.getItem(
    "activeQuiz_" + currentCategory
  );

  buttons.forEach((btn, index) => {

    const quizNum = index + 1;

    /* RESET */
    btn.classList.remove("active-quiz", "done-quiz");

    const started = sessionStorage.getItem(
      `${currentCategory}_quizStartTime${quizNum}`
    );

    const submitted = sessionStorage.getItem(
      `${currentCategory}_quiz${quizNum}_submitted`
    );

    /* 🟢 ACTIVE */
    if (
      (quizNum == currentQuiz || quizNum == savedActive) &&
      !submitted
    ) {
      btn.classList.add("active-quiz");
      return;
    }

    /* ⚪ DONE */
    if (started || submitted) {
      btn.classList.add("done-quiz");
    }

  });

}

function getCurrentTime12H_WithSeconds() {
  const now = new Date();

  let hours = now.getHours();
  const minutes = now.getMinutes().toString().padStart(2, "0");
  const ampm = hours >= 12 ? "PM" : "AM";

  hours = hours % 12;
  hours = hours ? hours : 12;

  return `${hours}:${minutes} ${ampm}`; // ✅ seconds removed
}

  let hours = dateObj.getHours();
  const minutes = dateObj.getMinutes().toString().padStart(2, "0");
  const ampm = hours >= 12 ? "PM" : "AM";

  hours = hours % 12;
  hours = hours ? hours : 12;

  return `${hours}:${minutes} ${ampm}`; // ✅ seconds removed
}

/* 🔥 RESTORE ANSWERS */

);

if (saved) {

      );

        applyAnswerStyles(i, ans);

  } catch (e) {

}

function selectAnswer(qIndex, optIndex) {

  /* 🚫 BLOCK IF PAUSED */
  if (isPaused) return;

  if (!Array.isArray(userAnswers)) return;

  /* 🔥 GET OLD VALUE FIRST */
  const oldValue = userAnswers[qIndex];

  /* 🔥 CHECK IF ALREADY ANSWERED */
  if (oldValue !== null && oldValue !== optIndex) {

    const confirmChange = confirm(
      "Iki kibazo wari wagisubije. Ese ushaka guhitamo ikindi gisubizo?\n\nOK = Yego\nCancel = Oya"
    );

    if (!confirmChange) {

      /* 🔙 SUBIRA KU OLD ANSWER */
      const oldRadio = document.querySelector(
        `input[name="q_${qIndex}"][value="${oldValue}"]`
      );

      if (oldRadio) oldRadio.checked = true;

      return;
    }
  }

  /* =========================
     ✅ NOW UPDATE ANSWER
  ========================= */
  userAnswers[qIndex] = optIndex;

  /* 🔥 AUTO SAVE */
  sessionStorage.setItem(
    `${currentCategory}_quiz${currentQuiz}_answers`,
    JSON.stringify(userAnswers)
  );

  /* 🔥 SHOW COLORS */
  applyAnswerStyles(qIndex, optIndex);

  const container = document.getElementById("quiz-container");
  if (!container) return;

  const questions = container.querySelectorAll(".question");

  /* =========================
     LAST QUESTION
  ========================= */
  if (qIndex === questions.length - 1) {

    setTimeout(() => {

      const submitBtn = document.getElementById("submit");

      if (submitBtn) {
        submitBtn.scrollIntoView({
          behavior: "smooth",
          block: "center"
        });
      }

    }, 300);

    return;
  }

  /* =========================
     NEXT QUESTION
  ========================= */

  const nextQuestion = questions[qIndex + 1];
  if (!nextQuestion) return;

  setTimeout(() => {

    const yOffset = -300;

    const y =
      nextQuestion.getBoundingClientRect().top +
      window.pageYOffset +
      yOffset;

    window.scrollTo({
      top: y,
      behavior: "smooth"
    });

  }, 250);
}

function applyAnswerStyles(qIndex, selectedIndex) {

  const options = document.querySelectorAll(
    `[id^="q_${qIndex}_"]`
  );

  options.forEach((opt, j) => {

    opt.classList.remove("correct", "wrong");

    if (j === correctAnswers[qIndex]) {
      opt.classList.add("correct");
    }

    if (j === selectedIndex && j !== correctAnswers[qIndex]) {
      opt.classList.add("wrong");
    }

  });

}

function isCodeAccepted(code) {

  // 🟥 1. New user → code empty = reject
  if (!code || code.trim() === "") {
    return false;
  }

  // 🟩 2. Returning user (saved & not expired)
  if (checkSavedCode(currentCategory)) {
    return true;
  }

  // 🟦 3. New user → validate today's code
  return isValidTodayCode(code, currentCategory);

}

function checkForm() {

  if (quizStarted) return;
  if (!currentQuiz || !currentCategory) return;

  const districtEl = document.getElementById("district");
  const proceedBtn = document.getElementById("proceed");
  const codeInput = document.getElementById("code");

    canProceed = true;

    if (icon) icon.style.display = "inline";
  }

  /* New user */
  if (!canProceed && codeInput) {

      district !== "" &&

      isValidTodayCode(enteredCode, currentCategory)
    ) {

/************ 2. CHECK SAVED CODE (PER CATEGORY) ************/

 function checkSavedCode(category) {

  if (!category) return false;

  const codeKey = "quiz_code_" + category;
  const timeKey = "quiz_code_time_" + category;

  const savedCode = localStorage.getItem(codeKey);
  const savedTime = localStorage.getItem(timeKey);

  if (!savedCode || !savedTime) return false;

  const validity = getCodeValidity();

  const age = Date.now() - Number(savedTime);

  if (age > validity) {

    localStorage.removeItem(codeKey);
    localStorage.removeItem(timeKey);

    alert("⏰ Igihe cya KODE cyarangiye. Ongera utwandikire 0783555042.");

    return false;
  }

  return true;
}

function getCodeValidity() {

  // 🛡️ Safety fallback
  if (!currentCategory) {
    console.warn("currentCategory missing, defaulting to week");
    return CODE_VALIDITY.week;
  }

  // ✅ Validity based on selected category
  return CODE_VALIDITY[currentCategory] || CODE_VALIDITY.week;
}


/* =========================
   AUTO CODE EXPIRATION CHECKER
   ========================= */

function checkCodeExpiration(category) {

  if (!category) return;

  const savedTime = localStorage.getItem(category + "_codeTime");
  const validity = CODE_VALIDITY[category];

  if (!savedTime || !validity) return;

  const now = Date.now();
  const age = now - parseInt(savedTime, 10);

  if (age > validity) {

    /* Code expired → clear saved data */

    localStorage.removeItem(category + "_savedCode");
    localStorage.removeItem(category + "_codeTime");

    console.log("Code expired for category:", category);

  }

}

  if (currentCategory === "month") {
    return document.getElementById("quizMenuMonth");
  }

  return null;
}

function scrollToQuizButton(quizNumber) {
  if (!quizNumber) return false;

  const menu = getActiveQuizMenu();
  if (!menu) return false;

  const buttons = menu.querySelectorAll("button.custom-button");

  const btn = buttons[quizNumber - 1];
  if (!btn) return false;

  setTimeout(() => {
    btn.scrollIntoView({
      behavior: "smooth",
      block: "center"
    });
  }, 200);

  return true;
}

function backToSelection() {

  const lastQuiz = currentQuiz;

  restartQuiz(); // 🔥 NOT resetQuizSystem

  const quizCont = document.getElementById("quiz-container");
  if (quizCont) quizCont.style.display = "none";

  currentQuiz = null;

const pauseBtn = document.getElementById("pauseBtn");
if (pauseBtn) pauseBtn.style.display = "none";

  const menu = getActiveQuizMenu();
  if (menu) menu.style.display = "block";
highlightActiveQuizButton();

  const moved = scrollToNextQuizButton(lastQuiz);

  if (!moved && menu) {
    setTimeout(() => {
      menu.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }, 200);
  }
}

// Scroll to next quiz button
function scrollToNextQuizButton(lastQuizNumber) {

  const menu = getActiveQuizMenu();
  if (!menu) return false;

  const buttons = Array.from(
    menu.querySelectorAll("button.custom-button")
  );

  const nextIndex = lastQuizNumber;

  if (buttons[nextIndex]) {

    setTimeout(() => {
      buttons[nextIndex].scrollIntoView({
        behavior: "smooth",
        block: "center"
      });
    }, 200);

    return true;
  }

  return false;
}

// Disable common inspect/dev tools shortcuts
document.onkeydown = function(e) {

  if (e.key === "F12") {
    e.preventDefault();
  }

  if (
    (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) ||
    (e.ctrlKey && e.key === "u") ||
    (e.ctrlKey && e.key === "s") ||
    (e.ctrlKey && e.shiftKey && e.key === "K")
  ) {
    e.preventDefault();
  }
};


// Quiz version checker
function checkQuizVersion() {
  const savedVersion = localStorage.getItem("quiz_version");

  if (!savedVersion) {
    localStorage.setItem("quiz_version", QUIZ_VERSION);
    return;
  }

  if (savedVersion !== QUIZ_VERSION) {
    alert(
      "⚠️ Hari ibyongewemo mu rwego rwo kunoza iyi system. Urakomeza ibizami byawe nk'ibisanzwe."
    );

    localStorage.setItem("quiz_version", QUIZ_VERSION);

    location.reload();
  }
}
